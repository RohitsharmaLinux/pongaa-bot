services:
  - type: web
    name: pongaa-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 30 --workers 1 app:app
    envVars:
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_FROM
        value: whatsapp:+14155238886
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: RohitSharmaLinux/pongaa-bot
